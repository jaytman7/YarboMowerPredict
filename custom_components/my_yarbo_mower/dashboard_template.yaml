# Generated by My Yarbo Mower. Regenerate this file from the integration after
# entity IDs change.
title: My Yarbo Mower
views:
  - title: Mower
    path: mower
    icon: mdi:robot-mower
    badges: []
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: >
              {% set activity = states('@@MOWER_ENTITY@@') %}
              {% set plan = states('@@NEXT_RUN_PLAN_SENSOR@@') %}
              # My Yarbo
              **{{ activity | replace('_',' ') | title if activity not in ['unknown','unavailable'] else 'Waiting for Yarbo data' }}**
              · Next: {{ plan if plan not in ['unknown','unavailable','None',''] else 'No plan selected' }}

          - type: horizontal-stack
            cards:
              - type: gauge
                entity: "@@BATTERY_SENSOR@@"
                name: Battery
                min: 0
                max: 100
                needle: true
                severity:
                  red: 0
                  yellow: 35
                  green: 70
              - type: gauge
                entity: "@@MOWING_CONDITIONS_SENSOR@@"
                name: Mowing
                min: 0
                max: 100
                needle: true
                severity:
                  red: 0
                  yellow: 45
                  green: 70
              - type: gauge
                entity: "@@GRASS_WETNESS_SENSOR@@"
                name: Wetness
                min: 0
                max: 100
                needle: true
                severity:
                  green: 0
                  yellow: 45
                  red: 70

          - type: entities
            title: Conditions
            show_header_toggle: false
            state_color: true
            entities:
              - entity: "@@MOWING_CONDITIONS_SENSOR@@"
                name: Favorability
              - entity: "@@GRASS_WETNESS_SENSOR@@"
                name: Grass wetness
              - entity: "@@WARM_WEATHER_GRASS_SWITCH@@"
                name: Warm weather grass
              - entity: "@@WEATHER_WINDOW_SENSOR@@"
                name: Next 3 hours
              - entity: "@@BEST_MOW_START_SENSOR@@"
                name: Best start
              - entity: "@@AFTER_SUNRISE_BLACKOUT_NUMBER@@"
                name: After sunrise blackout
              - entity: "@@BEFORE_SUNSET_BLACKOUT_NUMBER@@"
                name: Before sunset blackout
              - entity: "@@CHARGING_POWER_SENSOR@@"
                name: Charging power

      - type: vertical-stack
        cards:
          - type: grid
            columns: 4
            square: false
            cards:
              - type: button
                entity: "@@MOWER_ENTITY@@"
                name: Start
                icon: mdi:play
                show_state: false
                tap_action:
                  action: call-service
                  service: lawn_mower.start_mowing
                  target:
                    entity_id: "@@MOWER_ENTITY@@"
              - type: button
                entity: "@@MOWER_ENTITY@@"
                name: Pause
                icon: mdi:pause
                show_state: false
                tap_action:
                  action: call-service
                  service: lawn_mower.pause
                  target:
                    entity_id: "@@MOWER_ENTITY@@"
              - type: button
                entity: "@@RESUME_BUTTON@@"
                name: Resume
                icon: mdi:play-pause
                show_state: false
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: "@@RESUME_BUTTON@@"
              - type: button
                entity: "@@MOWER_ENTITY@@"
                name: Dock
                icon: mdi:home-import-outline
                show_state: false
                tap_action:
                  action: call-service
                  service: lawn_mower.dock
                  target:
                    entity_id: "@@MOWER_ENTITY@@"

          - type: grid
            columns: 4
            square: false
            cards:
              - type: button
                entity: "@@START_PLAN_BUTTON@@"
                name: Run Sequence
                icon: mdi:playlist-play
                show_state: false
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: "@@START_PLAN_BUTTON@@"
              - type: button
                entity: "@@STOP_BUTTON@@"
                name: Stop
                icon: mdi:stop
                show_state: false
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: "@@STOP_BUTTON@@"
              - type: button
                entity: "@@WAKE_BUTTON@@"
                name: Wake
                icon: mdi:power
                show_state: false
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: "@@WAKE_BUTTON@@"
              - type: button
                entity: "@@REFRESH_BUTTON@@"
                name: Refresh
                icon: mdi:refresh
                show_state: false
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: "@@REFRESH_BUTTON@@"

          - type: entities
            title: Mission
            show_header_toggle: false
            state_color: true
            entities:
              - entity: "@@MOWER_ENTITY@@"
                name: Mower
              - entity: "@@PLAN_SELECT@@"
                name: Plan
              - entity: "@@POWER_STATE_SELECT@@"
                name: Power state
              - entity: "@@PLAN_START_PERCENT_NUMBER@@"
                name: Start percent

          - type: entities
            title: Plan Sequence
            show_header_toggle: false
            state_color: true
            entities:
              - entity: "@@PLAN_SEQUENCE_SENSOR@@"
                name: Sequence
              - entity: "@@PREVIOUS_COMPLETED_PLAN_SENSOR@@"
                name: Previous completed
              - entity: "@@NEXT_RUN_PLAN_SENSOR@@"
                name: Start button plan
              - entity: "@@SEQUENCE_PLAN_SELECT@@"
                name: Sequence plan
              - entity: "@@ADD_SEQUENCE_PLAN_BUTTON@@"
                name: Add sequence plan
              - entity: "@@NEXT_SEQUENCE_PLAN_BUTTON@@"
                name: Next sequence plan
              - entity: "@@REMOVE_SEQUENCE_PLAN_BUTTON@@"
                name: Remove sequence plan
              - entity: "@@CLEAR_SEQUENCE_BUTTON@@"
                name: Clear sequence

          - type: entities
            title: Sequence Automation
            show_header_toggle: false
            state_color: true
            entities:
              - entity: "@@AUTO_SEQUENCE_READY_BINARY_SENSOR@@"
                name: Ready now
              - entity: "@@AUTO_WAKE_CHECKS_SWITCH@@"
                name: Auto wake checks
              - entity: "@@AUTO_SEQUENCE_START_SWITCH@@"
                name: Auto sequence start
              - entity: "@@AUTO_MIN_BATTERY_NUMBER@@"
                name: Min battery
              - entity: "@@AUTO_MIN_FAVORABILITY_NUMBER@@"
                name: Min favorability
              - entity: "@@AUTO_MAX_WETNESS_NUMBER@@"
                name: Max wetness
              - entity: "@@AUTO_WAKE_LEAD_NUMBER@@"
                name: Wake lead
              - entity: "@@AUTO_WAKE_INTERVAL_NUMBER@@"
                name: Wake interval
              - entity: "@@AUTO_START_GRACE_NUMBER@@"
                name: Start grace

          - type: markdown
            content: |
              {% set sequence = state_attr('@@PLAN_SEQUENCE_SENSOR@@', 'plans') or [] %}
              {% set current = state_attr('@@PLAN_SEQUENCE_SENSOR@@', 'sequence_index') | int(0) %}
              {% set auto = state_attr('@@AUTO_SEQUENCE_READY_BINARY_SENSOR@@', 'reason') %}
              **Previous:** {{ states('@@PREVIOUS_COMPLETED_PLAN_SENSOR@@') }}
              **Start button:** {{ states('@@NEXT_RUN_PLAN_SENSOR@@') }}
              **Next sequence:** {{ state_attr('@@PLAN_SEQUENCE_SENSOR@@', 'next_sequence_plan') or 'None' }}
              **Growth model:** {{ state_attr('@@PLAN_SEQUENCE_SENSOR@@', 'grass_profile_label') or 'Unknown' }} · {{ state_attr('@@PLAN_SEQUENCE_SENSOR@@', 'growth_rate_inches_per_day') or 0 }} in/day
              **Auto:** {{ auto or 'unknown' }}

              {% if sequence | length > 0 %}
              {% for plan in sequence %}
              {% set growth = plan.growth_since_last_mow_in %}
              {% set days = plan.growth_days %}
              {% if loop.index0 == current %}- next: {{ plan.name }} · {{ growth }} in{% else %}- {{ plan.name }} · {{ growth }} in{% endif %}{% if days not in [none, ''] %} · {{ days }} d{% endif %}
              {% endfor %}
              {% else %}
              Sequence is empty.
              {% endif %}

      - type: vertical-stack
        cards:
          - type: entities
            title: Status
            show_header_toggle: false
            state_color: true
            entities:
              - entity: "@@ONLINE_BINARY_SENSOR@@"
                name: Online
              - entity: "@@CHARGING_BINARY_SENSOR@@"
                name: Charging
              - entity: "@@PAUSED_BINARY_SENSOR@@"
                name: Paused
              - entity: "@@OBSTACLE_BINARY_SENSOR@@"
                name: Obstacle
              - entity: "@@STUCK_BINARY_SENSOR@@"
                name: Stuck
              - entity: "@@PLAN_STATUS_SENSOR@@"
                name: Plan status
              - entity: "@@RECHARGE_STATUS_SENSOR@@"
                name: Recharge status
              - entity: "@@RTK_SIGNAL_SENSOR@@"
                name: RTK signal
              - entity: "@@GPS_SATELLITES_SENSOR@@"
                name: GPS satellites
              - entity: "@@ERROR_CODE_SENSOR@@"
                name: Error code

          - type: entities
            title: Deck
            show_header_toggle: false
            state_color: true
            entities:
              - entity: "@@HEAD_TYPE_SENSOR@@"
                name: Head
              - entity: "@@BLADE_HEIGHT_NUMBER@@"
                name: Blade height
              - entity: "@@BLADE_SPEED_NUMBER@@"
                name: Blade speed
              - entity: "@@RAIN_SENSOR@@"
                name: Rain sensor

          - type: entities
            title: Direct SDK Controls
            show_header_toggle: false
            entities:
              - entity: "@@GENERATE_DASHBOARD_BUTTON@@"
                name: Generate dashboard
              - entity: "@@REFRESH_PLANS_BUTTON@@"
                name: Refresh plans
              - entity: "@@DOCK_BUTTON@@"
                name: Dock button
              - entity: "@@PAUSE_BUTTON@@"
                name: Pause button
              - entity: "@@RESUME_BUTTON@@"
                name: Resume button
              - entity: "@@STOP_BUTTON@@"
                name: Stop button
